<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Benance PvP</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
 margin:0;
 background:black;
 font-family:Arial;
 color:white;
}

#wallet{
 position:absolute;
 top:10px;
 left:10px;
}

#menu{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 text-align:center;
 width:320px;
 max-height:90vh;
 overflow:hidden;
}

#battleList{
 margin-top:20px;
 max-height:60vh;
 overflow-y:auto;
 padding-bottom:40px;
}

.battleCard{

 background:#1e1e1e;
 padding:15px;
 margin:10px auto;
 width:260px;

 border-radius:8px;

 box-shadow:0 0 10px rgba(0,0,0,0.6);

}

.battleCard button{

 margin-top:8px;
 margin-right:6px;

 padding:6px 10px;

 border:none;
 border-radius:4px;

 background:#2ecc71;
 color:white;

 cursor:pointer;

}

.battleCard button:hover{
 background:#27ae60;
}

canvas{
 display:block;
 margin:auto;
 background:black;
}

</style>

</head>

<body>

<div id="skinOverlay" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9998;
"></div>

<div id="skinPopup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:12px;
width:300px;
max-height:420px;
overflow-y:auto;
text-align:center;
z-index:9999;
">

<h2>Select Skin</h2>

<div id="skinList"></div>

<button onclick="closeSkinMenu()">Close</button>

</div>

<div id="wallet">

<button>Connect Wallet</button>

</div>

<div id="menu">

<h2>Battle Lobby</h2>

<input type="datetime-local" id="battleTime">

<button id="createBattle">Create Battle</button>

<button onclick="openSkinMenu()">Select Skin</button>

<div id="battleList"></div>

</div>

<div id="status" style="
 position:absolute;
 top:120px;
 width:100%;
 text-align:center;
 font-size:30px;
 font-weight:bold;
"></div>

<div id="winPopup" style="
 display:none;
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#222;
 padding:30px;
 border-radius:10px;
 text-align:center;
">

<h2>YOU WIN</h2>

<button onclick="backToMenu()">OK</button>

<button onclick="getPrize()">GET PRIZE</button>

</div>

<div id="spectatorGameOver" style="
 display:none;
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#222;
 padding:30px;
 border-radius:10px;
 text-align:center;
">

<h2>GAME OVER</h2>

<button onclick="backToMenu()">Back to Menu</button>

</div>

<canvas id="game" width="400" height="600"></canvas>

<script>

const skins = [
 {name:"Changpeng", file:"changpeng"},
 {name:"DO", file:"do"},
 {name:"Garuda", file:"garuda"},
 {name:"LUNC169", file:"lunc169"},
 {name:"Rocket", file:"rocket"}
];

const socket=io();

let gameActive = false;
let room=null;
let seed;
let startTime=0;
let countdownInterval = null;
let statusText = "";
let isSpectator = false;

let birdY=200;
let velocity=0;
let pipes=[];
let walletAddress = localStorage.getItem("wallet");
let playerSkin = localStorage.getItem("skin") || "changpeng";


let birdFrame = 0;
let flapTimer = 0;

let birdFrames = [
 new Image(),
 new Image()
];

let opponents = {};
let opponentPositions = {};

birdFrames[0].src = "skins/" + playerSkin + "_1.png";
birdFrames[1].src = "skins/" + playerSkin + "_2.png";

socket.on("opponentSkin",(data)=>{

 const img = new Image();

 img.src = "skins/" + data.skin + "_1.png";

 opponents[data.id] = img;

});

if(!walletAddress){

 walletAddress = "player_" + Math.random().toString(36).substr(2,5);

 localStorage.setItem("wallet",walletAddress);

}

socket.emit("registerWallet", walletAddress);

function renderSkinList(){

 const list = document.getElementById("skinList");

 list.innerHTML="";

 skins.forEach(s=>{

  const div=document.createElement("div");

  div.style.marginBottom="15px";

  div.innerHTML = `
   <img src="skins/${s.file}_1.png" width="60"><br>
   ${s.name}<br>
   <button onclick="selectSkin('${s.file}')">Select</button>
  `;

  list.appendChild(div);

 });

}

function selectSkin(file){

 playerSkin = file;

 localStorage.setItem("skin",file);

 birdFrames[0].src = "skins/" + file + "_1.png";
 birdFrames[1].src = "skins/" + file + "_2.png";

 alert("Skin selected");

}

function setMinBattleTime(){

 const now = new Date();

 now.setSeconds(0);
 now.setMilliseconds(0);

 const iso = now.toISOString().slice(0,16);

 document.getElementById("battleTime").min = iso;

}

setMinBattleTime();

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

socket.on("battleList",(battles)=>{

 window.currentBattles = battles;

 const list = document.getElementById("battleList");

 list.innerHTML="";

 battles.forEach(b=>{

  const div=document.createElement("div");
  
  const now = Date.now();
  
  let status = b.status || "OPEN";
  
  const diff = b.startTime - now;

  let cardColor = "#1e1e1e";

if(status === "REJECTED"){
 cardColor = "#555555";
}
else if(now >= b.startTime){
 status = "CLOSED";
 cardColor = "#333333";
}

else if(diff <= 60000){ 
 cardColor = "#8b0000"; // merah
}

else if(diff <= 300000){
 cardColor = "#b8860b"; // kuning
}

div.className="battleCard";
div.style.background = cardColor;

  const players = b.players || 0;


  let html = `
  <b>Battle #${b.id}</b><br>
  Bet: ${formatLunc(b.bet)} LUNC<br>
  Start: <span id="timer-${b.id}"></span><br>
  Players: ${players}/2<br>
  PEEP: ${b.peeps || 0}<br>
  Status: ${status}<br>
  `;


  if((status === "OPEN" || (status === "PLAYER READY" && b.creator === walletAddress)) && players < 2){
 html += `<button onclick="joinBattle(${b.id})">JOIN</button>`;
}else{
 html += `<button disabled>CLOSED</button>`;
}

if(b.creator !== walletAddress && status !== "CLOSED"){
 html += `<button onclick="peepBattle(${b.id})">PEEP</button>`;
}

  if(b.creator === walletAddress && status !== "CLOSED"){

 if(status === "REJECTED"){
  html += `<button onclick="cancelBattle(${b.id})">REFUND</button>`;
 }else{
  html += `<button onclick="cancelBattle(${b.id})">CANCEL</button>`;
 }

}

  div.innerHTML = html;

  list.appendChild(div);

  startLobbyTimer(b.id, b.startTime);

 });

});

document.getElementById("createBattle").onclick=()=>{

 const battleTime = document.getElementById("battleTime").value;

 if(!battleTime){
  alert("Failed, date not set");
  return;
 }

 const startTime = new Date(battleTime).getTime();

 const now = Date.now();
 const minTime = now + 10000; // 10 detik

 if(startTime < now){
  alert("Failed, date must be in the future");
  return;
 }

 if(startTime < minTime){
  alert("Failed, date must be +5 minute from current time");
  return;
 }

 // setelah tanggal valid baru minta bet
 const bet = prompt("Enter bet LUNC");

if(!bet) return;

if(!confirm("Deposit "+formatLunc(bet)+" LUNC to create this battle?")){
 return;
}

socket.emit("createBattle",{
 bet:Number(bet),
 startTime:startTime,
 creator:walletAddress
});

};

function openSkinMenu(){

 document.getElementById("skinOverlay").style.display="block";
 document.getElementById("skinPopup").style.display="block";

 renderSkinList();

}

function closeSkinMenu(){

 document.getElementById("skinPopup").style.display = "none";
 document.getElementById("skinOverlay").style.display = "none";

}

function startLobbyTimer(id,startTime){

 const el = document.getElementById("timer-"+id);

 function update(){

  const diff = startTime - Date.now();

  if(diff <= 0){

   el.innerText="Starting...";
   return;

  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000)/3600000);
  const m = Math.floor((diff % 3600000)/60000);
  const s = Math.floor((diff % 60000)/1000);

  el.innerText =
   d+"d "+h+"h "+m+"m "+s+"s";

 }

 update();

 setInterval(update,1000);

}

function cancelBattle(id){

 if(!confirm("Cancel this battle?")) return;

 socket.emit("cancelBattle",{
  id:id,
  wallet:walletAddress
 });

}

function peepBattle(id){

 room = "battle-" + id;

 isSpectator = true;

 socket.emit("peepBattle",{id:id});

 document.getElementById("menu").style.display="none";

}

function joinBattle(id){

 const battle = window.currentBattles.find(b => b.id === id);

 if(!battle) return;

 const bet = battle.bet;

 // creator tidak perlu deposit
 if(battle.creator !== walletAddress){

  if(!confirm("Deposit "+formatLunc(bet)+" LUNC to join this battle?")){
   return;
  }

 }

 room = "battle-" + id;

 socket.emit("joinBattle",{
  id:id,
  wallet:walletAddress,
  bet:bet,
  skin:playerSkin
 });

 document.getElementById("menu").style.display="none";

}

function formatLunc(amount){

 return Number(amount).toLocaleString("en-US",{
  minimumFractionDigits:2,
  maximumFractionDigits:2
 });

}

socket.on("startGame",(data)=>{

 seed = data.seed;
 startTime = data.startTime;

 startCountdown();

});

socket.on("joinDenied",(msg)=>{
 alert(msg);
});

socket.on("opponentPosition",(data)=>{
 opponentPositions[data.id] = data.y;
});

socket.on("youLose",()=>{

 if(isSpectator) return;

 alert("YOU LOSE");

 backToMenu();

});

socket.on("opponentDead",()=>{

 if(isSpectator){

  document.getElementById("spectatorGameOver").style.display="block";
  return;

 }

 document.getElementById("winPopup").style.display="block";

});

function getPrize(){

 socket.emit("claimPrize",{
  room:room,
  wallet:walletAddress
 });

 alert("Prize claimed!");

 document.getElementById("winPopup").style.display="none";

 backToMenu();

}

socket.on("cancelDenied",(msg)=>{
 alert(msg);
});

function seededRandom(){

 const x = Math.sin(seed++) * 10000;
 return x - Math.floor(x);

}

function createPipe(){

 const gap = 220;

 const minY = 50;
 const maxY = canvas.height - gap - 50;

 const y = minY + seededRandom() * (maxY - minY);

 pipes.push({
  x:canvas.width + 50,
  y:y,
  gap:gap
 });

}

setInterval(()=>{

 if(gameActive && Date.now() > startTime + 2000){
  createPipe();
 }

},2000);

document.addEventListener("click",()=>{

 velocity=-6;

});

function gameLoop(){

 ctx.clearRect(0,0,400,600);

 // tampilkan text countdown walaupun game belum aktif
 if(!gameActive){

  if(statusText !== ""){

   ctx.fillStyle="white";
   ctx.font="40px Arial";
   ctx.textAlign="center";

   ctx.fillText(statusText, canvas.width/2, canvas.height/2);

  }

  requestAnimationFrame(gameLoop);
  return;
 }

 if(!isSpectator){
 velocity += 0.4;
 birdY += velocity;
}
 // mati jika menyentuh lantai
if(!isSpectator){

 if(birdY + 20 >= canvas.height){

  if(gameActive){

   gameActive = false;
   socket.emit("playerDead",room);

  }

 }

}

 if(!isSpectator){
 socket.emit("playerPosition",{y:birdY,room:room});
}

 if(isSpectator){
 ctx.globalAlpha = 0.4;
}

flapTimer++;

if(flapTimer > 6){
 birdFrame = (birdFrame + 1) % 2;
 flapTimer = 0;
}

if(!isSpectator){
 ctx.drawImage(birdFrames[birdFrame],50,birdY,40,40);
}

ctx.globalAlpha = 1;

 Object.entries(opponents).forEach(([id,img])=>{

 const y = opponentPositions[id] !== undefined ? opponentPositions[id] : 200;

 if(img.complete && img.naturalWidth !== 0){

  ctx.globalAlpha = 0.4;
  ctx.drawImage(img,50,y,40,40);
  ctx.globalAlpha = 1;

 }

});

 pipes.forEach(pipe=>{

 pipe.x -= 2;

 ctx.fillStyle="green";

 ctx.fillRect(pipe.x,0,40,pipe.y);
 ctx.fillRect(pipe.x,pipe.y + pipe.gap,40,600);

 if(!isSpectator){

  if(50 < pipe.x + 40 && 70 > pipe.x){

   if(birdY < pipe.y || birdY + 20 > pipe.y + pipe.gap){

    if(gameActive){

     gameActive = false;
     socket.emit("playerDead",room);

    }

   }

  }

 }

});

 if(statusText !== ""){

  ctx.fillStyle="white";
  ctx.font="40px Arial";
  ctx.textAlign="center";

  ctx.fillText(statusText, canvas.width/2, canvas.height/2);

 }

 requestAnimationFrame(gameLoop);

}

function startCountdown(){

 clearInterval(countdownInterval);

 countdownInterval = setInterval(()=>{

  const diff = startTime - Date.now();

  if(diff <= 0){

   clearInterval(countdownInterval);

   statusText = "GO!";

   gameActive = true;

   setTimeout(()=>{
    statusText="";
   },1000);

   return;
  }

  const seconds = Math.ceil(diff / 1000);

  statusText = "Battle start in " + seconds;

 },200);

}

function backToMenu(){

 gameActive = false;
 room = null;

 pipes = [];

 birdY = 200;
 velocity = 0;

 opponentY = 200;

 opponents = {};
 opponentPositions = {};

 statusText = "";

 seed = 0;

 isSpectator = false;

 document.getElementById("winPopup").style.display="none";
 document.getElementById("spectatorGameOver").style.display="none";

 document.getElementById("menu").style.display = "block";

}

gameLoop();

</script>

</body>

</html>
