<!DOCTYPE html>
<html>
<head>
<title>Benance PvP Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>

#walletBox{
 position:absolute;
 top:20px;
 left:20px;
 z-index:10;
}

#connectWallet{
 padding:10px 20px;
 background:#222;
 color:white;
 border:none;
 border-radius:6px;
 cursor:pointer;
}

#menuBox{

 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);

 background:rgba(0,0,0,0.8);
 padding:30px;
 border-radius:10px;

 display:flex;
 flex-direction:column;
 gap:10px;

 text-align:center;
}

#menuBox button{

 padding:12px;
 font-size:16px;

 border:none;
 border-radius:6px;

 cursor:pointer;

 background:#2ecc71;
 color:white;
}

#menuBox button:hover{
 background:#27ae60;
}

body{
 margin:0;
 padding:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 overflow:hidden;
}

canvas{
 background:black;
 max-width:420px;
 width:100%;
 height:auto;
 aspect-ratio: 2 / 3;
 touch-action:none;
}

#status{
 position:absolute;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:Arial;
}

</style>
</head>

<body>

<div id="walletBox">
<button id="connectWallet">Connect Wallet</button>
</div>

<div id="menuBox">

<h2>Benance PvP</h2>

<button id="createBattle">Create Battle</button>
<button id="joinBattle">Join Battle</button>
const menuBox = document.getElementById("menuBox");

document.getElementById("joinBattle").onclick = ()=>{

 menuBox.style.display = "none";

 document.getElementById("status").innerText = "Waiting opponent...";

 socket.emit("joinBattle");

};

<button id="statistic">Statistic</button>

</div>

<h2 id="status">Connecting...</h2>

<canvas id="game" width="400" height="600"></canvas>

<script>

const socket = io();

let seed;
let gameStarted = false;
let gameOver = false;
let opponentDead = false;
let result = "";
let score = 0;
let startTime = 0;

socket.on("status", (msg)=>{
 document.getElementById("status").innerText = msg;
});

socket.on("startGame", (data)=>{

 seed = data.seed;
 startTime = data.startTime;

 document.getElementById("status").innerText = "Match Found!";
});

socket.on("opponentScore", (s)=>{
 console.log("Opponent score:", s);
});

socket.on("opponentPosition", (data)=>{
 opponentY = data.y;
});

socket.on("opponentDead", ()=>{

 opponentDead = true;

 if(!gameOver){
   result = "YOU WIN";
   gameOver = true;
 }

});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menuBox = document.getElementById("menuBox");

document.getElementById("createBattle").onclick = () => {

 menuBox.style.display = "none";

 document.getElementById("status").innerText = "Waiting opponent...";

};

document.getElementById("joinBattle").onclick = () => {

 menuBox.style.display = "none";

 document.getElementById("status").innerText = "Searching battle...";

};

document.getElementById("statistic").onclick = () => {

 alert("Statistic coming soon");

};


let birdY = 200;
let velocity = 0;
let pipes = [];

let opponentY = 200;

function seededRandom(seed){
 const x = Math.sin(seed++) * 10000;
 return x - Math.floor(x);
}

function createPipe(){
 const y = 100 + seededRandom(seed) * 300;

 pipes.push({
  x:400,
  y:y
 });

 seed++;
}

let lastPipeTime = 0;

function flap(){
 velocity = -6;
}

document.addEventListener("click", flap);

document.addEventListener("touchstart",(e)=>{
 e.preventDefault();
 flap();
});

function gameLoop(){

if(gameOver){

 ctx.fillStyle="white";
 ctx.font="40px Arial";
 ctx.textAlign="center";
 ctx.fillText("GAME OVER",200,260);
 ctx.fillText(result,200,320);

}

 const groundY = 580;
 if(startTime === 0){
   requestAnimationFrame(gameLoop);
   return;
 }

 if(Date.now() < startTime){

  ctx.clearRect(0,0,400,600);

  let seconds = Math.ceil((startTime - Date.now()) / 1000);

  ctx.fillStyle="white";
  ctx.font="60px Arial";
  ctx.textAlign="center";
  ctx.fillText(seconds,200,300);

  requestAnimationFrame(gameLoop);
  return;
 }

 if(!gameStarted){
   gameStarted = true;
   document.getElementById("status").innerText = "GO!";
 }

 ctx.clearRect(0,0,400,600);

 if(!gameOver){
 velocity += 0.4;
 birdY += velocity;
}

 if(birdY > groundY){

 if(!gameOver){

  gameOver = true;

  if(!opponentDead){
    result = "YOU LOSE";
  }

  socket.emit("playerDead");

 }

}

 if(!gameOver){
 socket.emit("playerPosition", {y: birdY});
}

 ctx.fillStyle="yellow";
 ctx.fillRect(50,birdY,20,20);

 ctx.globalAlpha = 0.4;
 ctx.fillStyle="cyan";
 ctx.fillRect(50, opponentY, 20, 20);
 ctx.globalAlpha = 1;

 const gameTime = Date.now() - startTime;

if(gameStarted && gameTime - lastPipeTime > 2000){
 createPipe();
 lastPipeTime = gameTime;
}

pipes.forEach(pipe => {

 pipe.x -= 2;

 const gap = 150;

 ctx.fillStyle="green";
 ctx.fillRect(pipe.x,0,40,pipe.y);
 ctx.fillRect(pipe.x,pipe.y+gap,40,600);

 // collision horizontal
 if(50 < pipe.x + 40 && 50 + 20 > pipe.x){

   // collision atas atau bawah
   if(birdY < pipe.y || birdY + 20 > pipe.y + gap){

     if(!gameOver){

       gameOver = true;

       if(!opponentDead){
         result = "YOU LOSE";
       }

       socket.emit("playerDead");

     }

   }

 }

 // score
 if(pipe.x === 50){
  score++;
  socket.emit("score",score);
 }

});

if(result !== ""){

 ctx.fillStyle="white";
 ctx.font="40px Arial";
 ctx.textAlign="center";

 ctx.fillText("GAME OVER",200,250);
 ctx.fillText(result,200,320);

}

 requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
